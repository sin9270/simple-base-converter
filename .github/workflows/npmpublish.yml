name: Node.js Package

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint:ci
      - run: pnpm test

  version-and-publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: https://registry.npmjs.org/
          cache: pnpm
      - run: npm install -g npm@latest
      - run: git config --global user.name "WATANABE Shin"
      - run: git config --global user.email "sin9270@gmail.com"
      - run: pnpm version ${{ inputs.version || 'patch' }} -m "v%s [skip ci]"
      - run: git push origin HEAD --tags
      - run: pnpm install --frozen-lockfile
      - run: npm publish --provenance --access public
      - run: gh release create "v$(node -p 'require("./package.json").version')" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
